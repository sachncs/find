[package]
name = "find"
version = "1.0.0"
edition = "2021"
description = "A high-performance Rust system for secp256k1 cryptographic research and educational discovery."
authors = ["Sachin <https://github.com/sachn-cs>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/sachn-cs?tab=repositories"
readme = "README.md"
categories = ["cryptography", "command-line-utilities"]
keywords = ["bitcoin", "secp256k1", "ecc", "search", "cryptography"]

[dependencies]
k256 = { version = "0.13", features = ["arithmetic", "serde", "bits", "pkcs8"] }
clap = { version = "4.4", features = ["derive", "env"] }
anyhow = "1.0"
thiserror = "1.0"
hex = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
num-bigint = "0.4"

[dev-dependencies]
proptest = "1.5"
tempfile = "3.10"
rand = "0.8"
rand_chacha = "0.3"
criterion = "0.5"
num-bigint = "0.4"
num-traits = "0.2"

[[bench]]
name = "bench"
harness = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = 'abort'
strip = true
overflow-checks = true
